<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Wiki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #e2ddd8;
    --border2: #ccc8c2;
    --text: #1a1916;
    --text2: #6b6760;
    --text3: #9e9a95;
    --accent: #2a2826;
    --star: #d97706;
    --tag-bg: #eeeae4;
    --tag-text: #4a4640;
    --purple-bg: #ede9fe;
    --purple-text: #5b21b6;
    --teal-bg: #ccfbf1;
    --teal-text: #0f766e;
    --amber-bg: #fef3c7;
    --amber-text: #92400e;
    --coral-bg: #fee2e2;
    --coral-text: #991b1b;
    --radius: 10px;
    --radius-lg: 14px;
    font-family: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
  }

  /* SIDEBAR */
  .sidebar {
    width: 230px;
    min-width: 230px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    overflow-y: auto;
    z-index: 10;
  }

  .sidebar-brand {
    padding: 22px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-brand h1 {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .sidebar-brand p {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
  }

  .new-btn {
    display: block;
    width: calc(100% - 24px);
    margin: 12px 12px 0;
    padding: 9px 14px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    text-align: center;
    transition: opacity .15s;
  }
  .new-btn:hover { opacity: .85; }

  .nav-section {
    padding: 18px 20px 6px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .nav-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    border-radius: 0;
    transition: background .1s, color .1s;
  }
  .nav-item:hover { background: var(--bg); color: var(--text); }
  .nav-item.active { background: var(--bg); color: var(--text); font-weight: 500; }
  .nav-badge {
    font-size: 11px;
    background: var(--surface2);
    color: var(--text3);
    border-radius: 99px;
    padding: 1px 8px;
    min-width: 22px;
    text-align: center;
  }

  /* MAIN */
  .main {
    margin-left: 230px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 5;
  }

  .search-wrap {
    flex: 1;
    position: relative;
    max-width: 480px;
  }
  .search-wrap input {
    width: 100%;
    padding: 9px 14px 9px 36px;
    font-size: 13px;
    font-family: inherit;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--border2); }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    color: var(--text3);
    pointer-events: none;
  }

  .view-toggle {
    display: flex;
    gap: 2px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 3px;
  }
  .vbtn {
    padding: 5px 10px;
    font-size: 14px;
    background: none;
    border: none;
    border-radius: 7px;
    color: var(--text3);
    cursor: pointer;
    transition: background .1s, color .1s;
  }
  .vbtn.active { background: var(--surface); color: var(--text); }

  .content {
    padding: 24px 28px;
    flex: 1;
  }
  .count-label {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 16px;
  }

  /* CARDS */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .list { display: flex; flex-direction: column; gap: 8px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
  }
  .card:hover { border-color: var(--border2); box-shadow: 0 2px 12px rgba(0,0,0,.06); }

  .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .card-title { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; flex: 1; padding-right: 8px; }
  .star-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--text3); padding: 0; line-height: 1; flex-shrink: 0; }
  .star-btn.on { color: var(--star); }

  .card-desc { font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 12px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

  .card-foot { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 99px;
    background: var(--tag-bg);
    color: var(--tag-text);
    font-weight: 500;
  }
  .tag.purple { background: var(--purple-bg); color: var(--purple-text); }
  .tag.teal   { background: var(--teal-bg);   color: var(--teal-text); }
  .tag.amber  { background: var(--amber-bg);  color: var(--amber-text); }
  .tag.coral  { background: var(--coral-bg);  color: var(--coral-text); }

  /* MODAL */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(20,18,15,.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    width: 580px;
    max-width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .modal-head {
    padding: 20px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-head h2 { font-size: 15px; font-weight: 500; }
  .close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text3); line-height: 1; padding: 0; }
  .modal-body { padding: 22px; display: flex; flex-direction: column; gap: 16px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 9px 12px;
    font-size: 13px;
    font-family: inherit;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--border2); }
  .field textarea { min-height: 130px; resize: vertical; font-family: 'DM Mono', monospace; font-size: 12px; line-height: 1.7; }

  .modal-foot {
    padding: 16px 22px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .btn { padding: 8px 18px; font-size: 13px; font-family: inherit; font-weight: 500; border-radius: var(--radius); cursor: pointer; transition: opacity .15s; }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text2); }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  .btn-dark { background: var(--accent); border: 1px solid var(--accent); color: #fff; }
  .btn-dark:hover { opacity: .85; }
  .btn-del { background: none; border: 1px solid #fca5a5; color: #b91c1c; }
  .btn-del:hover { background: var(--coral-bg); }

  .prompt-display {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
  }
  .copy-btn {
    padding: 5px 14px;
    font-size: 12px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: none;
    color: var(--text2);
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .copy-btn:hover { border-color: var(--border2); color: var(--text); }
  .copy-btn.copied { border-color: var(--teal-text); color: var(--teal-text); }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--text3); font-size: 14px; }
  .empty-state p { margin-top: 8px; font-size: 12px; }

  @media (max-width: 640px) {
    .sidebar { transform: translateX(-100%); transition: transform .2s; }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .topbar { padding: 12px 16px; }
    .content { padding: 16px; }
    .hamburger { display: flex !important; }
  }
  .hamburger { display: none; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text); padding: 2px; }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <h1>Prompt Wiki</h1>
    <p>プロンプト管理ツール</p>
  </div>
  <button class="new-btn" onclick="openNew()">+ 新規プロンプト</button>
  <div class="nav-section">カテゴリ</div>
  <div id="cat-nav"></div>
  <div class="nav-section" style="margin-top:8px">フィルター</div>
  <div class="nav-item" id="fav-nav" onclick="toggleFav()">
    ⭐ お気に入り
    <span class="nav-badge" id="fav-count">0</span>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <button class="hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="タイトル・タグ・本文で検索..." oninput="render()">
    </div>
    <div class="view-toggle">
      <button class="vbtn active" id="vg" onclick="setView('grid')">⊞</button>
      <button class="vbtn" id="vl" onclick="setView('list')">≡</button>
    </div>
  </div>
  <div class="content">
    <div class="count-label" id="count-label"></div>
    <div id="cards-area"></div>
  </div>
</div>

<script>
const CATS = ['すべて','執筆','コーディング','分析','翻訳','画像生成','その他'];
const TAG_COLORS = ['purple','teal','','amber','coral','teal',''];
let view = 'grid', activeCat = 'すべて', favOnly = false;
let prompts = [];

function loadData() {
  try {
    const s = localStorage.getItem('prompt-wiki-v1');
    if (s) prompts = JSON.parse(s);
  } catch(e) {}
  if (!prompts.length) {
    prompts = [
      { id:1, title:'ブログ記事生成', desc:'SEOを意識した記事を生成するプロンプト', prompt:'あなたはプロのコンテンツライターです。以下のテーマについて、SEOを意識した読みやすいブログ記事を書いてください。\n\nテーマ: {{テーマ}}\nターゲット読者: {{対象読者}}\n文字数: 約{{文字数}}文字', cat:'執筆', tags:['SEO','ブログ'], star:true },
      { id:2, title:'コードレビュー', desc:'コードの品質・バグ・改善点を指摘する', prompt:'以下のコードをレビューしてください。\n\n```\n{{コード}}\n```\n\n以下の観点でフィードバックをください：\n1. バグや潜在的な問題\n2. パフォーマンス改善\n3. 可読性・保守性', cat:'コーディング', tags:['レビュー','品質'], star:false },
      { id:3, title:'データ分析サマリー', desc:'数値データを分かりやすく要約する', prompt:'以下のデータを分析し、重要な洞察をまとめてください。\n\nデータ: {{データ}}\n\n・主要な傾向\n・異常値や注目点\n・推奨アクション', cat:'分析', tags:['データ','レポート'], star:true },
    ];
    saveData();
  }
  render(); renderCats();
}

function saveData() {
  try { localStorage.setItem('prompt-wiki-v1', JSON.stringify(prompts)); } catch(e) {}
}

function e(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderCats() {
  const counts = {};
  CATS.forEach(c => counts[c] = 0);
  prompts.forEach(p => { counts['すべて']++; counts[p.cat] = (counts[p.cat]||0)+1; });
  document.getElementById('cat-nav').innerHTML = CATS.map(c =>
    `<div class="nav-item${activeCat===c&&!favOnly?' active':''}" onclick="setCat('${c}')">${c}<span class="nav-badge">${counts[c]||0}</span></div>`
  ).join('');
  document.getElementById('fav-count').textContent = prompts.filter(p=>p.star).length;
  document.getElementById('fav-nav').classList.toggle('active', favOnly);
}

function setCat(c) { activeCat=c; favOnly=false; render(); renderCats(); }
function toggleFav() { favOnly=!favOnly; render(); renderCats(); }
function setView(v) {
  view=v;
  document.getElementById('vg').classList.toggle('active', v==='grid');
  document.getElementById('vl').classList.toggle('active', v==='list');
  render();
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  return prompts.filter(p => {
    if (activeCat !== 'すべて' && p.cat !== activeCat) return false;
    if (favOnly && !p.star) return false;
    if (q && !p.title.toLowerCase().includes(q) && !p.desc.toLowerCase().includes(q) && !p.prompt.toLowerCase().includes(q) && !p.tags.some(t=>t.toLowerCase().includes(q))) return false;
    return true;
  });
}

function render() {
  const list = filtered();
  document.getElementById('count-label').textContent = `${list.length} 件`;
  const area = document.getElementById('cards-area');
  if (!list.length) {
    area.innerHTML = `<div class="empty-state">🔍 見つかりません<p>条件を変えて再検索してみてください</p></div>`;
    return;
  }
  const wrap = document.createElement('div');
  wrap.className = view === 'grid' ? 'grid' : 'list';
  wrap.innerHTML = list.map(p => `
    <div class="card" onclick="openView(${p.id})">
      <div class="card-head">
        <div class="card-title">${e(p.title)}</div>
        <button class="star-btn${p.star?' on':''}" onclick="toggleStar(event,${p.id})">★</button>
      </div>
      <div class="card-desc">${e(p.desc)}</div>
      <div class="card-foot">
        <span class="tag amber">${e(p.cat)}</span>
        ${p.tags.map((t,i)=>`<span class="tag ${TAG_COLORS[i%TAG_COLORS.length]}">${e(t)}</span>`).join('')}
      </div>
    </div>`).join('');
  area.innerHTML = '';
  area.appendChild(wrap);
}

function toggleStar(ev, id) {
  ev.stopPropagation();
  const p = prompts.find(x=>x.id===id);
  if (p) { p.star=!p.star; saveData(); render(); renderCats(); }
}

function openView(id) {
  const p = prompts.find(x=>x.id===id); if (!p) return;
  showOverlay(`
    <div class="modal-head">
      <h2>${e(p.title)}</h2>
      <button class="close" onclick="closeOverlay()">×</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        <span class="tag amber">${e(p.cat)}</span>
        ${p.tags.map((t,i)=>`<span class="tag ${TAG_COLORS[i%TAG_COLORS.length]}">${e(t)}</span>`).join('')}
      </div>
      <p style="font-size:13px;color:var(--text2);line-height:1.7">${e(p.desc)}</p>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--text3)">プロンプト本文</span>
        <button class="copy-btn" id="copy-btn" onclick="copyPrompt(${JSON.stringify(e(p.prompt))})">コピー</button>
      </div>
      <div class="prompt-display">${e(p.prompt)}</div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-del" onclick="deletePrompt(${p.id})">削除</button>
      <button class="btn btn-ghost" onclick="closeOverlay()">閉じる</button>
      <button class="btn btn-dark" onclick="closeOverlay();openEdit(${p.id})">編集</button>
    </div>`);
}

function copyPrompt(text) {
  const decoded = text.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  navigator.clipboard.writeText(decoded).then(() => {
    const b = document.getElementById('copy-btn');
    if (b) { b.textContent='コピー済み'; b.classList.add('copied'); setTimeout(()=>{b.textContent='コピー';b.classList.remove('copied');},1500); }
  });
}

function deletePrompt(id) {
  if (!confirm('このプロンプトを削除しますか？')) return;
  prompts = prompts.filter(p=>p.id!==id);
  saveData(); render(); renderCats(); closeOverlay();
}

let editId = null;

function openNew() { editId=null; showForm({title:'',desc:'',prompt:'',cat:'執筆',tags:'',star:false}); }
function openEdit(id) { const p=prompts.find(x=>x.id===id); if(p){editId=id;showForm({...p,tags:p.tags.join(', ')});} }

function showForm(d) {
  showOverlay(`
    <div class="modal-head">
      <h2>${editId?'プロンプトを編集':'新規プロンプト'}</h2>
      <button class="close" onclick="closeOverlay()">×</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>タイトル *</label><input id="f-title" value="${e(d.title)}" placeholder="例: ブログ記事生成"></div>
      <div class="field"><label>説明</label><input id="f-desc" value="${e(d.desc)}" placeholder="このプロンプトの用途を簡潔に"></div>
      <div class="field"><label>カテゴリ</label>
        <select id="f-cat">${CATS.filter(c=>c!=='すべて').map(c=>`<option${c===d.cat?' selected':''}>${c}</option>`).join('')}</select>
      </div>
      <div class="field"><label>プロンプト本文</label><textarea id="f-prompt" placeholder="プロンプトを入力...">${e(d.prompt)}</textarea></div>
      <div class="field"><label>タグ（カンマ区切り）</label><input id="f-tags" value="${e(d.tags)}" placeholder="例: SEO, ブログ, 記事"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeOverlay()">キャンセル</button>
      <button class="btn btn-dark" onclick="savePrompt()">保存</button>
    </div>`);
}

function savePrompt() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('タイトルを入力してください'); return; }
  const data = {
    title,
    desc: document.getElementById('f-desc').value.trim(),
    prompt: document.getElementById('f-prompt').value,
    cat: document.getElementById('f-cat').value,
    tags: document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    star: false
  };
  if (editId) {
    const idx = prompts.findIndex(p=>p.id===editId);
    if (idx>=0) { data.id=editId; data.star=prompts[idx].star; prompts[idx]=data; }
  } else {
    data.id = Date.now();
    prompts.unshift(data);
  }
  saveData(); render(); renderCats(); closeOverlay();
}

function showOverlay(html) {
  closeOverlay();
  const ov = document.createElement('div');
  ov.className = 'overlay'; ov.id = 'overlay';
  ov.onclick = ev => { if(ev.target===ov) closeOverlay(); };
  ov.innerHTML = `<div class="modal">${html}</div>`;
  document.body.appendChild(ov);
}
function closeOverlay() { const o=document.getElementById('overlay'); if(o) o.remove(); }

document.addEventListener('keydown', ev => { if(ev.key==='Escape') closeOverlay(); });

loadData();
</script>
</body>
</html>
